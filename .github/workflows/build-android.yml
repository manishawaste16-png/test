name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  android-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Create local.properties
        run: |
          mkdir -p SalesforceAuthApp/android
          echo "sdk.dir=$ANDROID_HOME" > SalesforceAuthApp/android/local.properties

      - name: Install dependencies
        working-directory: SalesforceAuthApp
        run: npm ci

      - name: Build debug APK
        working-directory: SalesforceAuthApp/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-auth-app-debug-apk
          path: SalesforceAuthApp/android/app/build/outputs/apk/debug/app-debug.apk
